<!DOCTYPE html>
<html>
<head>
    <title>测试页面</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>测试API - 深圳到龙岩</h1>
    <button id="testBtn">点击测试</button>
    <div id="result"></div>

    <script>
        document.getElementById('testBtn').onclick = async function() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在测试...';

            try {
                const cityA = '深圳';
                const cityB = '龙岩';

                console.log('发送请求:', {cityA, cityB});

                const response = await fetch('/api/calculate-optimal-cities', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cityA, cityB, maxResults: 3})
                });

                const data = await response.json();
                console.log('响应:', data);

                if (data.error) {
                    resultDiv.innerHTML = '<p style="color:red">错误: ' + data.error + '</p>';
                } else if (data.recommendations && data.recommendations.length > 0) {
                    let html = '<h3>推荐结果:</h3><ul>';
                    data.recommendations.forEach(r => {
                        html += '<li>' + r.city + ' - 评分:' + r.score + '</li>';
                    });
                    html += '</ul>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<p>没有找到推荐结果</p>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<p style="color:red">请求失败: ' + error.message + '</p>';
            }
        };
    </script>
</body>
</html>
